<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe — Kata Demo</title>
  <style>
    :root { --ink:#2a2320; --accent:#c2410c; --line:#e7ddd1; --muted:#7a6f64; --bg:#fffaf3; --flag:#9a3412; --flagbg:#fde7d6; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, Arial, sans-serif; color:var(--ink); background:var(--bg); line-height:1.6; }
    main { max-width: 680px; margin:0 auto; padding:2rem 1.5rem; }
    a.back { color:var(--accent); text-decoration:none; font-size:.9rem; }
    h1 { margin:.5rem 0 .25rem; }
    .yield { color:var(--muted); margin:0 0 1.5rem; }
    table { border-collapse:collapse; width:100%; }
    th, td { text-align:left; padding:.6rem .5rem; border-bottom:1px solid var(--line); vertical-align:top; }
    th { font-size:.8rem; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); }
    .raw { color:var(--muted); font-size:.85rem; font-family: ui-monospace, monospace; }
    .flag { display:inline-block; background:var(--flagbg); color:var(--flag); font-size:.72rem; padding:.1rem .45rem; border-radius:4px; margin:.1rem .2rem .1rem 0; }
    .note { color:var(--muted); font-style:italic; font-size:.85rem; }
    nav { margin-top:2rem; padding-top:1rem; border-top:1px solid var(--line); font-size:.9rem; }
    nav a { color:var(--accent); }
    .error { color:#b91c1c; }
  </style>
</head>
<body>
  <main>
    <a class="back" href="index.html">&larr; All recipes</a>
    <div id="content"></div>
  </main>

  <script type="module">
    import { parseIngredient } from "./js/parse.js";

    const content = document.getElementById("content");
    const id = new URLSearchParams(location.search).get("id");

    try {
      const recipes = await (await fetch("data/recipes.json")).json();
      const recipe = recipes.find(r => r.id === id);

      if (!recipe) {
        content.innerHTML = `<p class="error">Recipe not found: ${id ?? "(no id given)"}.</p>`;
      } else {
        const rows = recipe.ingredients.map(raw => {
          const ing = parseIngredient(raw);
          const flags = ing.flags.map(f => `<span class="flag" title="data-quality flag">${f}</span>`).join("");
          const amount = ing.amount === null ? "—" : `${ing.amount}${ing.unit ?? ""}`;
          const note = ing.note ? `<div class="note">(${ing.note})</div>` : "";
          return `<tr>
            <td>${ing.name}${note}${flags ? "<div>" + flags + "</div>" : ""}</td>
            <td>${amount}</td>
            <td class="raw">${ing.raw}</td>
          </tr>`;
        }).join("");

        content.innerHTML = `
          <h1>${recipe.title}</h1>
          <p class="yield">Yield: serves ${recipe.yield}</p>
          <table>
            <thead><tr><th>Ingredient</th><th>Amount</th><th>As written</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
          <nav>
            Advanced:
            <a href="order.html?id=${encodeURIComponent(recipe.id)}">scale &amp; build an order</a>
            &middot; <a href="data.html">data &amp; conversion logic</a>
          </nav>`;
      }
    } catch (e) {
      content.innerHTML = `<p class="error">Could not load recipe: ${e.message}</p>`;
    }
  </script>
</body>
</html>
