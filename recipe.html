<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe — Kata Demo</title>
  <style>
    :root { --ink:#2a2320; --accent:#c2410c; --line:#e7ddd1; --muted:#7a6f64; --bg:#fffaf3; --accent-soft:#fde7d6; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, Arial, sans-serif; color:var(--ink); background:var(--bg); line-height:1.6; }
    main { max-width: 640px; margin:0 auto; padding:2rem 1.5rem; }
    a.back { color:var(--accent); text-decoration:none; font-size:.9rem; }
    h1 { margin:.5rem 0 .25rem; }
    .yield { color:var(--muted); margin:0 0 1.5rem; }
    a.cta { display:inline-block; background:var(--accent); color:#fff; text-decoration:none; padding:.65rem 1.15rem; border-radius:7px; font-size:1.05rem; }
    a.cta:hover { background:#a8380a; }
    nav { margin-top:2rem; padding-top:1rem; border-top:1px solid var(--line); font-size:.9rem; color:var(--muted); }
    nav a { color:var(--accent); }
    .error { color:#b91c1c; }
  </style>
</head>
<body>
  <main>
    <a class="back" href="index.html">&larr; All recipes</a>
    <div id="content"></div>
  </main>

  <script type="module">
    // "The page for the recipe" (Kata brief, bullet 1). It shows the recipe and
    // routes to its ingredients page (bullet 2). The advanced pages are linked,
    // not required by the brief.
    const content = document.getElementById("content");
    const id = new URLSearchParams(location.search).get("id");
    const esc = (s) => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;");

    try {
      const recipes = await (await fetch("data/recipes.json")).json();
      const recipe = recipes.find((r) => r.id === id);

      if (!recipe) {
        content.innerHTML = `<p class="error">Recipe not found: ${esc(id ?? "(no id given)")}.</p>`;
      } else {
        const eid = encodeURIComponent(recipe.id);
        content.innerHTML = `
          <h1>${esc(recipe.title)}</h1>
          <p class="yield">Yield: serves ${recipe.yield}</p>
          <p><a class="cta" href="ingredients.html?id=${eid}">View ingredients &rarr;</a></p>
          <nav>
            Advanced (beyond the brief):
            <a href="order.html?id=${eid}">scale &amp; build an order</a>
            &middot; <a href="data.html">data &amp; conversion logic</a>
          </nav>`;
      }
    } catch (e) {
      content.innerHTML = `<p class="error">Could not load recipe: ${esc(e.message)}</p>`;
    }
  </script>
</body>
</html>
