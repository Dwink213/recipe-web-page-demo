<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe — Kata Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <a class="back" href="index.html">&larr; All recipes</a>
    <div id="content"></div>
  </main>

  <!--
    "A page listing the ingredients used in the recipe. This page doesn't need
    to have any interactive elements." (Kata brief, bullet 2)
    Plain listing — no flags, no interactive controls.
  -->
  <script type="module">
    const content = document.getElementById("content");
    const id = new URLSearchParams(location.search).get("id");
    const esc = (s) => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;");

    try {
      const recipes = await (await fetch("data/recipes.json")).json();
      const recipe = recipes.find((r) => r.id === id);

      if (!recipe) {
        content.innerHTML = `<p class="error">Recipe not found: ${esc(id ?? "(no id given)")}.</p>`;
      } else {
        const eid = encodeURIComponent(recipe.id);
        content.innerHTML = `
          <h1>${esc(recipe.title)}</h1>
          <p class="yield">Yield: serves ${recipe.yield}</p>
          <h2 class="label">Ingredients</h2>
          <ul class="ing">
            ${recipe.ingredients.map((i) => `<li>${esc(i)}</li>`).join("")}
          </ul>
          <nav class="adv">
            Advanced (beyond the brief):
            <a href="order.html?id=${eid}">scale &amp; build an order</a>
            &middot; <a href="data.html">data &amp; conversion logic</a>
          </nav>`;
      }
    } catch (e) {
      content.innerHTML = `<p class="error">Could not load recipe: ${esc(e.message)}</p>`;
    }
  </script>
</body>
</html>
