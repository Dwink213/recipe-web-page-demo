<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe — Kata Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!--
    PAGE:     ingredients.html
    WHAT:     "The page for the recipe" — lists the ingredients used in it.
              Kata brief bullet 2: "doesn't need to have any interactive elements."
    DISPLAYS: recipe title, yield, and a plain list of ingredient strings.
    DATA:     fetches data/recipes.json at runtime (reads ?id= from the URL).
    IN  (linked from): index.html, order.html (back)
    OUT (links to):    index.html (back), order.html, data.html
    MODULES:  none — display only, no parsing or flags here (those live on order.html)
  -->
  <main>
    <a class="back" href="index.html">&larr; All recipes</a>
    <div id="content"></div>
  </main>

  <script type="module">
    // WHAT: find the recipe by its ?id= and render its ingredient strings as-is.
    // WHY:  the brief wants a plain listing; keeping it display-only (no flags,
    //       no controls) honors "no interactive elements" and stays simple.
    const content = document.getElementById("content");
    const id = new URLSearchParams(location.search).get("id");
    const esc = (s) => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;");

    try {
      const recipes = await (await fetch("data/recipes.json")).json();
      const recipe = recipes.find((r) => r.id === id);

      if (!id) {
        content.innerHTML = `<p class="error">No recipe selected.</p>
          <p><a class="back" href="index.html">Browse all recipes &rarr;</a></p>`;
      } else if (!recipe) {
        content.innerHTML = `<p class="error">Recipe not found: ${esc(id)}.</p>
          <p><a class="back" href="index.html">Browse all recipes &rarr;</a></p>`;
      } else {
        const eid = encodeURIComponent(recipe.id);
        content.innerHTML = `
          <h1>${esc(recipe.title)}</h1>
          <p class="yield">Yield: serves ${recipe.yield}</p>
          <h2 class="label">Ingredients</h2>
          <ul class="ing">
            ${recipe.ingredients.map((i) => `<li>${esc(i)}</li>`).join("")}
          </ul>
          <nav class="adv">
            Advanced (beyond the brief):
            <a href="order.html?id=${eid}">scale &amp; build an order</a>
            &middot; <a href="data.html">data &amp; conversion logic</a>
          </nav>`;
      }
    } catch (e) {
      content.innerHTML = `<p class="error">Could not load recipe: ${esc(e.message)}</p>`;
    }
  </script>
</body>
</html>
