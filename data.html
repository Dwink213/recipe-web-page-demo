<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data &amp; Logic — Kata Demo (Advanced)</title>
  <style>
    :root { --ink:#2a2320; --accent:#c2410c; --line:#e7ddd1; --muted:#7a6f64; --bg:#fffaf3; --code:#f5efe6; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, Arial, sans-serif; color:var(--ink); background:var(--bg); line-height:1.6; }
    main { max-width: 860px; margin:0 auto; padding:2rem 1.5rem; }
    a.back { color:var(--accent); text-decoration:none; font-size:.9rem; }
    h1 { margin:.5rem 0 1rem; }
    h2.section { margin:2rem 0 .5rem; padding-bottom:.3rem; border-bottom:2px solid var(--line); }
    pre.json { background:var(--code); border:1px solid var(--line); border-radius:8px; padding:1rem; overflow:auto; font-size:.82rem; font-family: ui-monospace, monospace; }
    .doc h1 { font-size:1.4rem; }
    .doc h2 { font-size:1.15rem; margin-top:1.5rem; }
    .doc h3 { font-size:1rem; color:var(--accent); }
    .doc hr { border:0; border-top:1px solid var(--line); margin:1.5rem 0; }
    .doc blockquote { border-left:3px solid var(--accent); margin:1rem 0; padding:.25rem 1rem; color:var(--muted); font-style:italic; }
    .doc code { background:var(--code); padding:.1rem .35rem; border-radius:4px; font-size:.9em; }
    nav { margin-top:2rem; padding-top:1rem; border-top:1px solid var(--line); font-size:.9rem; }
    nav a { color:var(--accent); }
    .error { color:#b91c1c; }
  </style>
</head>
<body>
  <main>
    <a class="back" href="index.html">&larr; All recipes</a>
    <h1>Data &amp; conversion logic</h1>
    <p>The machine-readable data the app runs on, and the human-readable logic behind every conversion — side by side.</p>

    <h2 class="section">recipes.json</h2>
    <pre class="json" id="recipes">loading…</pre>

    <h2 class="section">procurement.json</h2>
    <pre class="json" id="procurement">loading…</pre>

    <h2 class="section">Conversion logic</h2>
    <div class="doc" id="doc">loading…</div>

    <nav><a href="index.html">&larr; back to recipes</a></nav>
  </main>

  <script type="module">
    // Minimal, dependency-free Markdown -> HTML. Covers exactly what
    // conversion-logic.md uses: headings, hr, blockquote, lists, **bold**,
    // `code`, and paragraphs. Keeps Page 3 zero-dependency (no CDN over file://).
    function mdToHtml(md) {
      const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      const inline = s => esc(s)
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/`(.+?)`/g, "<code>$1</code>");

      const out = [];
      let para = [], list = [];
      const flushPara = () => { if (para.length) { out.push("<p>" + inline(para.join(" ")) + "</p>"); para = []; } };
      const flushList = () => { if (list.length) { out.push("<ul>" + list.map(li => "<li>" + inline(li) + "</li>").join("") + "</ul>"); list = []; } };

      for (const line of md.split("\n")) {
        const t = line.trim();
        if (t === "") { flushPara(); flushList(); continue; }
        if (t === "---") { flushPara(); flushList(); out.push("<hr>"); continue; }
        let m;
        if (m = t.match(/^(#{1,6})\s+(.*)$/)) { flushPara(); flushList(); out.push(`<h${m[1].length}>${inline(m[2])}</h${m[1].length}>`); continue; }
        if (m = t.match(/^>\s?(.*)$/)) { flushPara(); out.push(`<blockquote>${inline(m[1])}</blockquote>`); continue; }
        if (m = t.match(/^[-*]\s+(.*)$/)) { flushPara(); list.push(m[1]); continue; }
        flushList(); para.push(t);
      }
      flushPara(); flushList();
      return out.join("\n");
    }

    try {
      const [recipes, procurement, mdText] = await Promise.all([
        fetch("data/recipes.json").then(r => r.json()),
        fetch("data/procurement.json").then(r => r.json()),
        fetch("data/conversion-logic.md").then(r => r.text()),
      ]);
      document.getElementById("recipes").textContent = JSON.stringify(recipes, null, 2);
      document.getElementById("procurement").textContent = JSON.stringify(procurement, null, 2);
      document.getElementById("doc").innerHTML = mdToHtml(mdText);
    } catch (e) {
      document.getElementById("doc").innerHTML = `<p class="error">Could not load data: ${e.message}</p>`;
    }
  </script>
</body>
</html>
