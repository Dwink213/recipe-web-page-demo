<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data &amp; Logic — Kata Demo (Advanced)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!--
    PAGE:     data.html  (advanced — beyond the kata brief)
    WHAT:     Self-documenting view — the data the app runs on next to the
              plain-English logic, so the system explains itself.
    DISPLAYS: pretty-printed recipes.json + procurement.json, and the rendered
              data/conversion-logic.md.
    DATA:     fetches data/recipes.json + data/procurement.json + conversion-logic.md.
    IN  (linked from): index.html, ingredients.html, order.html
    OUT (links to):    index.html
    MODULES:  none (inline markdown renderer below)
  -->
  <main class="wide">
    <a class="back" href="index.html">&larr; All recipes</a>
    <h1>Data &amp; conversion logic</h1>
    <p>The machine-readable data the app runs on, and the human-readable logic behind every conversion — side by side.</p>

    <h2 class="section">recipes.json</h2>
    <pre class="json" id="recipes">loading…</pre>

    <h2 class="section">procurement.json</h2>
    <pre class="json" id="procurement">loading…</pre>

    <h2 class="section">Conversion logic</h2>
    <div class="doc" id="doc">loading…</div>

    <nav><a href="index.html">&larr; back to recipes</a></nav>
  </main>

  <script type="module">
    // WHAT: minimal Markdown -> HTML for conversion-logic.md (headings, hr,
    //       blockquote, lists, **bold**, `code`, paragraphs).
    // WHY:  Page 3 renders that doc, and a tiny renderer keeps the site
    //       dependency-free — no CDN, which also avoids file:// fetch issues.
    function mdToHtml(md) {
      const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      const inline = s => esc(s)
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/`(.+?)`/g, "<code>$1</code>");

      const out = [];
      let para = [], list = [];
      const flushPara = () => { if (para.length) { out.push("<p>" + inline(para.join(" ")) + "</p>"); para = []; } };
      const flushList = () => { if (list.length) { out.push("<ul>" + list.map(li => "<li>" + inline(li) + "</li>").join("") + "</ul>"); list = []; } };

      for (const line of md.split("\n")) {
        const t = line.trim();
        if (t === "") { flushPara(); flushList(); continue; }
        if (t === "---") { flushPara(); flushList(); out.push("<hr>"); continue; }
        let m;
        if (m = t.match(/^(#{1,6})\s+(.*)$/)) { flushPara(); flushList(); out.push(`<h${m[1].length}>${inline(m[2])}</h${m[1].length}>`); continue; }
        if (m = t.match(/^>\s?(.*)$/)) { flushPara(); out.push(`<blockquote>${inline(m[1])}</blockquote>`); continue; }
        if (m = t.match(/^[-*]\s+(.*)$/)) { flushPara(); list.push(m[1]); continue; }
        flushList(); para.push(t);
      }
      flushPara(); flushList();
      return out.join("\n");
    }

    try {
      const [recipes, procurement, mdText] = await Promise.all([
        fetch("data/recipes.json").then(r => r.json()),
        fetch("data/procurement.json").then(r => r.json()),
        fetch("data/conversion-logic.md").then(r => r.text()),
      ]);
      document.getElementById("recipes").textContent = JSON.stringify(recipes, null, 2);
      document.getElementById("procurement").textContent = JSON.stringify(procurement, null, 2);
      document.getElementById("doc").innerHTML = mdToHtml(mdText);
    } catch (e) {
      document.getElementById("doc").innerHTML = `<p class="error">Could not load data: ${e.message}</p>`;
    }
  </script>
</body>
</html>
