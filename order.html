<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order — Kata Demo (Advanced)</title>
  <style>
    :root { --ink:#2a2320; --accent:#c2410c; --line:#e7ddd1; --muted:#7a6f64; --bg:#fffaf3;
            --flag:#9a3412; --flagbg:#fde7d6; --ok:#15803d; --okbg:#dcfce7;
            --pending:#92400e; --pendingbg:#fef3c7; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, Arial, sans-serif; color:var(--ink); background:var(--bg); line-height:1.55; }
    main { max-width: 760px; margin:0 auto; padding:2rem 1.5rem; }
    a.back { color:var(--accent); text-decoration:none; font-size:.9rem; }
    h1 { margin:.5rem 0 .25rem; }
    .meta { color:var(--muted); margin:0 0 1rem; }
    .controls { display:flex; gap:.75rem; align-items:center; margin:1rem 0 1.25rem; flex-wrap:wrap; }
    .controls input { width:5rem; padding:.35rem .5rem; font-size:1rem; }
    .status { display:inline-block; padding:.2rem .7rem; border-radius:999px; font-size:.8rem; font-weight:700; letter-spacing:.03em; }
    .status.pending { background:var(--pendingbg); color:var(--pending); }
    .status.approved { background:var(--okbg); color:var(--ok); }
    .banner { padding:.75rem 1rem; border-radius:8px; margin:1rem 0; font-size:.9rem; }
    .banner.pending { background:var(--pendingbg); color:var(--pending); border:1px solid #fcd34d; }
    .banner.approved { background:var(--okbg); color:var(--ok); border:1px solid #86efac; }

    .line { display:flex; justify-content:space-between; gap:1rem; align-items:flex-start;
            padding:.6rem .85rem; border:1px solid var(--line); border-radius:8px; margin-bottom:.5rem; background:#fff; }
    .line .name { font-weight:600; }
    .line .nums { text-align:right; white-space:nowrap; font-variant-numeric:tabular-nums; color:var(--muted); font-size:.9rem; }
    .line .nums .cost { color:var(--ink); font-weight:600; }
    .note { color:var(--muted); font-style:italic; font-size:.85rem; }
    .illustrative { color:var(--muted); font-size:.72rem; }
    .splitnote { color:var(--muted); font-size:.82rem; margin:-.15rem .15rem .75rem; padding-left:.7rem; border-left:3px solid var(--accent); }

    button { background:var(--accent); color:#fff; border:0; border-radius:6px; padding:.6rem 1.2rem; font-size:1rem; cursor:pointer; }
    button:disabled { background:var(--ok); cursor:default; }
    .total { display:flex; justify-content:space-between; font-weight:700; padding:.7rem .85rem; border-top:2px solid var(--line); margin-top:.5rem; }
    nav { margin-top:2rem; padding-top:1rem; border-top:1px solid var(--line); font-size:.9rem; }
    nav a { color:var(--accent); }
    .error { color:#b91c1c; }
  </style>
</head>
<body>
  <main>
    <a class="back" href="index.html">&larr; All recipes</a>
    <div id="content"></div>
  </main>

  <script type="module">
    import { buildOrder } from "./js/convert.js";

    const content = document.getElementById("content");
    const params = new URLSearchParams(location.search);
    const id = params.get("id");

    let recipe, procurement;
    let approved = false;

    try {
      [recipe, procurement] = await Promise.all([
        fetch("data/recipes.json").then((r) => r.json()).then((rs) => rs.find((r) => r.id === id)),
        fetch("data/procurement.json").then((r) => r.json()),
      ]);
    } catch (e) {
      content.innerHTML = `<p class="error">Could not load data: ${e.message}</p>`;
    }

    const money = (n) => "$" + n.toFixed(2);
    const round1 = (n) => Math.round(n * 10) / 10;
    const esc = (s) => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;");

    if (!recipe) {
      content.innerHTML = `<p class="error">Recipe not found: ${esc(id ?? "(no id given)")}.</p>`;
    } else {
      render(Number(params.get("servings")) || recipe.yield);
    }

    function render(servings) {
      const order = buildOrder(recipe, servings, procurement);
      const total = order.lines.reduce((s, l) => s + (l.lineCost || 0), 0);

      // Render lines in order; the salt/pepper pair gets a shared caption.
      const renderedGroups = new Set();
      const cards = order.lines.map((l) => {
        if (l.bundle) {
          if (renderedGroups.has(l.bundle.group)) return "";
          renderedGroups.add(l.bundle.group);
          const parts = order.lines.filter((x) => x.bundle && x.bundle.group === l.bundle.group);
          return parts.map(lineCard).join("") +
            `<p class="splitnote">Split from “${esc(l.bundle.group)}” into an even split by weight.
             Salt and pepper cost very differently and the kitchen doesn’t treat them as equal,
             so they’re ordered as two separate lines.</p>`;
        }
        return lineCard(l);
      }).join("");

      content.innerHTML = `
        <h1>${esc(recipe.title)} — order</h1>
        <p class="meta">Base yield serves ${recipe.yield}. Scale factor ${order.scale.toFixed(2)}×. Prices are illustrative.</p>

        <div class="controls">
          <label>Servings: <input id="servings" type="number" min="1" step="1" value="${servings}" ${approved ? "disabled" : ""}></label>
          <span class="status ${approved ? "approved" : "pending"}">${approved ? "APPROVED" : "PENDING"}</span>
        </div>

        <div class="banner ${approved ? "approved" : "pending"}">
          ${approved
            ? "Order approved by a human."
            : "Review the scaled order below, then approve. Nothing is ordered until you approve."}
        </div>

        ${cards}

        <div class="total">
          <span>Total <span class="illustrative">(illustrative)</span></span>
          <span>${money(total)}</span>
        </div>

        <p style="margin-top:1.25rem">
          <button id="approve" ${approved ? "disabled" : ""}>${approved ? "✓ Approved" : "Approve Order"}</button>
        </p>

        <nav>
          <a href="ingredients.html?id=${encodeURIComponent(recipe.id)}">&larr; ingredients</a>
          &middot; <a href="data.html">data &amp; conversion logic</a>
        </nav>`;

      const sInput = document.getElementById("servings");
      sInput.addEventListener("change", (e) => {
        const v = Math.max(1, Math.floor(Number(e.target.value) || recipe.yield));
        approved = false;
        render(v);
      });
      document.getElementById("approve").addEventListener("click", () => { approved = true; render(servings); });
    }

    function lineCard(l) {
      const note = l.note ? `<div class="note">(${esc(l.note)})</div>` : "";
      let nums;
      if (l.qty !== undefined && l.qty !== null) {
        nums = `${round1(l.grams)} g &rarr; ${l.qty} ${esc(l.buyUnitLabel)}<br><span class="cost">${money(l.lineCost)}</span> <span class="illustrative">illus.</span>`;
      } else {
        nums = `${l.grams !== null ? round1(l.grams) + " g" : "—"}`;
      }
      return `<div class="line">
        <div><div class="name">${esc(l.name)}</div>${note}</div>
        <div class="nums">${nums}</div>
      </div>`;
    }
  </script>
</body>
</html>
