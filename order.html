<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order — Kata Demo (Advanced)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!--
    PAGE:     order.html  (advanced — beyond the kata brief)
    WHAT:     Order builder for one recipe — scale, convert to procurement units,
              price (illustrative), with editable ambiguous lines and an Approve step.
    DISPLAYS: servings control, one card per order line (salt/pepper split shown
              with a caption), a running total, and pending/approved status.
    DATA:     fetches data/recipes.json + data/procurement.json (reads ?id= and
              optional ?servings= from the URL).
    IN  (linked from): index.html (Advanced nav → recipe picker), ingredients.html
    OUT (links to):    index.html (back), ingredients.html, data.html, order.html (picker rows)
    MODULES:  js/convert.js (buildOrder, convertToBuyUnit)
    NO ?id=:  shows a recipe picker so the order builder is reachable from the index.
  -->
  <main>
    <a class="back" href="index.html">&larr; All recipes</a>
    <div id="content"></div>
  </main>

  <script type="module">
    import { buildOrder, convertToBuyUnit } from "./js/convert.js";

    const content = document.getElementById("content");
    const params = new URLSearchParams(location.search);
    const id = params.get("id");

    let recipe, procurement, order;
    let approved = false;
    const overrides = {}; // line id -> human-set grams

    try {
      [recipe, procurement] = await Promise.all([
        fetch("data/recipes.json").then((r) => r.json()).then((rs) => rs.find((r) => r.id === id)),
        fetch("data/procurement.json").then((r) => r.json()),
      ]);
    } catch (e) {
      content.innerHTML = `<p class="error">Could not load data: ${e.message}</p>`;
    }

    const money = (n) => "$" + n.toFixed(2);
    const round1 = (n) => Math.round(n * 10) / 10;
    const esc = (s) => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;");

    // A line is adjustable if it's part of a split (salt/pepper) or carries any
    // data-quality flag — i.e. anything ambiguous a human might want to correct.
    const editable = (l) => !!l.bundle || (l.flags && l.flags.length > 0);

    // WHAT: recompute a line's buy-unit quantity and cost from its current grams.
    // WHY:  editing an ambiguous line must reprice it live; the conversion math
    //       itself stays in convert.js (convertToBuyUnit) — this only re-applies it.
    function reprice(l) {
      const p = procurement[l.name];
      if (!p) { l.qty = undefined; l.lineCost = undefined; return; }
      l.qty = convertToBuyUnit(l.grams, p);
      l.buyUnitLabel = p.buyUnitLabel || p.buyUnit;
      l.lineCost = l.qty * p.pricePerBuyUnit;
    }

    // WHAT: the right-hand numbers cell for a line: scaled grams -> qty -> cost.
    // WHY:  rendered on first paint and again on every live edit, so it's one fn.
    function numsHtml(l) {
      if (l.qty !== undefined && l.qty !== null) {
        return `${round1(l.grams)} g &rarr; ${l.qty} ${esc(l.buyUnitLabel)}<br>` +
               `<span class="cost">${money(l.lineCost)}</span> <span class="illustrative">illus.</span>`;
      }
      return l.grams !== null ? round1(l.grams) + " g" : "—";
    }

    // WHAT/WHY: sum every line's cost for the order total (skips unpriced lines).
    const totalNow = () => order.lines.reduce((s, l) => s + (l.lineCost || 0), 0);

    if (!id) {
      // WHAT: no recipe chosen — show a picker of every recipe.
      // WHY:  the index has no single-recipe context, so the order builder needs
      //       its own entry point to be reachable from the index's Advanced nav.
      const recipes = await (await fetch("data/recipes.json")).json();
      content.innerHTML = `
        <h1>Build an order</h1>
        <p class="meta">Pick a recipe to scale, convert to procurement units, and price.</p>
        <ul class="recipes">
          ${recipes.map((r) => `
            <li><a href="order.html?id=${encodeURIComponent(r.id)}">
              <span>${esc(r.title)}</span><span class="yield">serves ${r.yield}</span>
            </a></li>`).join("")}
        </ul>
        <nav><a href="index.html">&larr; All recipes</a> &middot; <a href="data.html">data &amp; conversion logic</a></nav>`;
    } else if (!recipe) {
      content.innerHTML = `<p class="error">Recipe not found: ${esc(id)}.</p>`;
    } else {
      render(Number(params.get("servings")) || recipe.yield);
    }

    // WHAT: render one order-line card; ambiguous lines get an editable grams input.
    // WHY:  the user can correct an ambiguous amount (salt/pepper) inline; normal
    //       lines are display-only. The input is hidden once the order is approved.
    function lineCard(l) {
      const note = l.note ? `<div class="note">(${esc(l.note)})</div>` : "";
      const editor = editable(l) && !approved
        ? `<div><input class="qty-edit" type="number" min="0" step="0.1" data-idx="${l.id}" value="${round1(l.grams)}"> g</div>`
        : "";
      return `<div class="line">
        <div><div class="name">${esc(l.name)}</div>${note}${editor}</div>
        <div class="nums" data-idx="${l.id}">${numsHtml(l)}</div>
      </div>`;
    }

    // WHAT: build the order at this serving count, paint the page, and wire the
    //       servings control, Approve button, and per-line live-edit inputs.
    // WHY:  a single render path keeps state (overrides, approved) and the DOM in
    //       sync; edits update in place afterward so inputs don't lose focus.
    function render(servings) {
      order = buildOrder(recipe, servings, procurement);
      order.lines.forEach((l, i) => {
        l.id = i;
        if (overrides[i] != null) { l.grams = overrides[i]; reprice(l); }
      });

      const renderedGroups = new Set();
      const cards = order.lines.map((l) => {
        if (l.bundle) {
          if (renderedGroups.has(l.bundle.group)) return "";
          renderedGroups.add(l.bundle.group);
          const parts = order.lines.filter((x) => x.bundle && x.bundle.group === l.bundle.group);
          return parts.map(lineCard).join("") +
            `<p class="splitnote">Split from “${esc(l.bundle.group)}”. Salt and pepper cost very differently
             and the kitchen doesn’t treat them as equal, so they’re separate lines — adjust either amount above.</p>`;
        }
        return lineCard(l);
      }).join("");

      content.innerHTML = `
        <h1>${esc(recipe.title)} — order</h1>
        <p class="meta">Base yield serves ${recipe.yield}. Scale factor ${order.scale.toFixed(2)}×. Prices illustrative; adjust ambiguous lines.</p>

        <div class="controls">
          <label>Servings: <input id="servings" type="number" min="1" step="1" value="${servings}" ${approved ? "disabled" : ""}></label>
          <span class="status ${approved ? "approved" : "pending"}">${approved ? "APPROVED" : "PENDING"}</span>
        </div>

        <div class="banner ${approved ? "approved" : "pending"}">
          ${approved
            ? "Order approved by a human."
            : "Review and adjust the order below, then approve. Nothing is ordered until you approve."}
        </div>

        ${cards}

        <div class="total">
          <span>Total <span class="illustrative">(illustrative)</span></span>
          <span id="grand-total">${money(totalNow())}</span>
        </div>

        <p style="margin-top:1.25rem">
          <button id="approve" ${approved ? "disabled" : ""}>${approved ? "✓ Approved" : "Approve Order"}</button>
        </p>

        <nav>
          <a href="ingredients.html?id=${encodeURIComponent(recipe.id)}">&larr; ingredients</a>
          &middot; <a href="data.html">data &amp; conversion logic</a>
        </nav>`;

      // Servings change rebuilds the order and clears edits + approval.
      document.getElementById("servings").addEventListener("change", (e) => {
        const v = Math.max(1, Math.floor(Number(e.target.value) || recipe.yield));
        for (const k in overrides) delete overrides[k];
        approved = false;
        render(v);
      });
      document.getElementById("approve").addEventListener("click", () => { approved = true; render(servings); });

      // WHAT: live-edit a line's grams — reprice that line and the total in place,
      //       without re-rendering, so the input keeps focus.
      // WHY:  edits are intentionally independent; salt and pepper are NOT
      //       reconciled back to the original bundled weight (illustrative demo).
      content.querySelectorAll(".qty-edit").forEach((inp) => {
        inp.addEventListener("input", () => {
          const idx = Number(inp.dataset.idx);
          const g = Math.max(0, Number(inp.value) || 0);
          overrides[idx] = g;
          const l = order.lines[idx];
          l.grams = g; reprice(l);
          const cell = content.querySelector(`.nums[data-idx="${idx}"]`);
          if (cell) cell.innerHTML = numsHtml(l);
          const tot = document.getElementById("grand-total");
          if (tot) tot.textContent = money(totalNow());
        });
      });
    }
  </script>
</body>
</html>
